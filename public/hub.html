<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>퀴즈 게임 허브 — EduMole Pro</title>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- Fonts -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/Paperlogy@1.0.0/css/paperlogy.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/fonts-archive/GmarketSans/GmarketSans.css" rel="stylesheet">

    <!-- Design System -->
    <link rel="stylesheet" href="/shared/common.css">

    <!-- Firebase Config -->
    <script src="/firebase-config.js"></script>

    <style>
        /* === Hub Layout === */
        .hub-wrap {
            max-width: 420px;
            margin: 0 auto;
            padding: 0 var(--space-xl);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .view { display: none; flex-direction: column; }
        .view.active { display: flex; }

        /* === Hero === */
        .hero {
            text-align: center;
            padding-top: clamp(48px, 12vh, 80px);
            padding-bottom: var(--space-3xl);
        }
        .hero-icon {
            width: 64px; height: 64px;
            margin: 0 auto var(--space-lg);
            color: var(--color-primary);
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: var(--font-size-3xl);
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-sm);
        }
        .hero-sub {
            font-size: var(--font-size-sm);
            color: var(--text-tertiary);
        }

        /* === PIN Section === */
        .pin-section {
            padding: var(--space-2xl);
            margin-bottom: var(--space-2xl);
            text-align: center;
        }
        .pin-label {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
        }
        .pin-row {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            margin-bottom: var(--space-xl);
        }
        .pin-row .input-pin {
            width: 56px;
            height: 64px;
            font-size: 28px;
        }
        .pin-row.shake { animation: shake 0.4s ease; }

        .pin-submit {
            width: 100%;
        }

        /* === Teacher Login === */
        .teacher-section {
            text-align: center;
            margin-bottom: var(--space-3xl);
        }
        .teacher-section .divider {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
            color: var(--text-tertiary);
            font-size: var(--font-size-xs);
        }
        .teacher-section .divider::before,
        .teacher-section .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }
        .google-btn {
            width: 100%;
            gap: var(--space-md);
        }
        .google-btn svg { flex-shrink: 0; }

        /* === Game Grid === */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
            margin-bottom: var(--space-3xl);
        }
        .game-card {
            padding: var(--space-xl);
            text-align: center;
            cursor: default;
        }
        .game-card-icon {
            width: 40px; height: 40px;
            margin: 0 auto var(--space-md);
            color: var(--color-primary);
        }
        .game-card-title {
            font-weight: 700;
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
        }
        .game-card-desc {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            line-height: 1.4;
        }

        /* === Student Name View === */
        .back-btn {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: var(--font-size-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-sm) 0;
            margin-top: var(--space-2xl);
            font-family: var(--font-family);
        }
        .session-info-card {
            padding: var(--space-xl);
            margin: var(--space-xl) 0;
            text-align: center;
        }
        .session-game-type {
            font-size: var(--font-size-xs);
            font-weight: 700;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--space-xs);
        }
        .session-quiz-title {
            font-size: var(--font-size-lg);
            font-weight: 700;
            color: var(--text-primary);
        }
        .name-form {
            margin-top: var(--space-lg);
        }
        .name-form .input {
            margin-bottom: var(--space-lg);
            text-align: center;
            font-size: var(--font-size-lg);
        }

        /* === Teacher Dashboard === */
        .profile-bar {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-xl) 0;
            margin-top: var(--space-xl);
        }
        .profile-photo {
            width: 40px; height: 40px;
            border-radius: var(--radius-full);
            object-fit: cover;
            border: 2px solid var(--border-light);
        }
        .profile-name {
            flex: 1;
            font-weight: 700;
            font-size: var(--font-size-sm);
            color: var(--text-primary);
        }
        .logout-btn {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-family);
            padding: var(--space-sm) var(--space-md);
        }
        .logout-btn:hover { color: var(--color-danger); }

        /* Wizard */
        .wizard-steps {
            margin-bottom: var(--space-xl);
        }
        .wizard-step-panel {
            display: none;
        }
        .wizard-step-panel.active {
            display: block;
        }
        .step-title {
            font-size: var(--font-size-sm);
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
        }
        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; height: 24px;
            border-radius: var(--radius-full);
            background: var(--gradient-primary);
            color: white;
            font-size: 12px;
            font-weight: 700;
            margin-right: var(--space-sm);
        }

        /* Quiz Set List */
        .quiz-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            max-height: 280px;
            overflow-y: auto;
        }
        .quiz-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-md);
            background: var(--bg-white);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .quiz-item:hover { border-color: var(--border-light); }
        .quiz-item.selected {
            border-color: var(--color-primary);
            background: rgba(124, 158, 245, 0.06);
        }
        .quiz-item-title {
            flex: 1;
            font-size: var(--font-size-sm);
            font-weight: 600;
        }
        .quiz-item-count {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
        }

        /* Game Type Grid */
        .game-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }
        .game-type-card {
            padding: var(--space-xl);
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }
        .game-type-card:hover { border-color: var(--border-light); }
        .game-type-card.selected {
            border-color: var(--color-primary);
            background: rgba(124, 158, 245, 0.06);
        }
        .game-type-card.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .badge-soon {
            position: absolute;
            top: var(--space-sm);
            right: var(--space-sm);
            font-size: 10px;
            font-weight: 700;
            color: var(--color-primary);
            background: rgba(124, 158, 245, 0.12);
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }
        .game-type-icon {
            width: 36px; height: 36px;
            margin: 0 auto var(--space-sm);
            color: var(--color-primary);
        }
        .game-type-name {
            font-size: var(--font-size-sm);
            font-weight: 700;
        }

        /* Class Select */
        .class-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }
        .class-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-md);
            background: var(--bg-white);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .class-item:hover { border-color: var(--border-light); }
        .class-item.selected {
            border-color: var(--color-primary);
            background: rgba(124, 158, 245, 0.06);
        }

        .summary-card {
            padding: var(--space-xl);
            margin-bottom: var(--space-xl);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: var(--space-sm) 0;
            font-size: var(--font-size-sm);
        }
        .summary-label { color: var(--text-tertiary); }
        .summary-value { font-weight: 700; color: var(--text-primary); }

        .wizard-nav {
            display: flex;
            gap: var(--space-md);
            margin-top: var(--space-xl);
        }
        .wizard-nav .btn { flex: 1; }

        /* === Session Lobby === */
        .lobby-header {
            text-align: center;
            padding-top: clamp(40px, 10vh, 72px);
            margin-bottom: var(--space-2xl);
        }
        .lobby-label {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: var(--space-md);
        }
        .pin-display {
            background: var(--gradient-primary);
            border-radius: var(--radius-2xl);
            padding: var(--space-2xl) var(--space-3xl);
            display: inline-block;
        }
        .pin-digits {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 800;
            color: white;
            letter-spacing: 0.2em;
            line-height: 1;
        }
        .lobby-summary {
            padding: var(--space-xl);
            margin-bottom: var(--space-xl);
            text-align: center;
        }
        .lobby-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }
        .lobby-actions .btn {
            width: 100%;
        }

        /* === Empty state === */
        .empty-icon {
            width: 48px; height: 48px;
            color: var(--text-tertiary);
            margin: 0 auto var(--space-md);
            opacity: 0.5;
        }

        /* Fade transition */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .hub-wrap { padding: 0 var(--space-lg); }
            .hero { padding-top: 40px; }
            .pin-row .input-pin { width: 48px; height: 56px; font-size: 24px; }
            .pin-digits { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="hub-wrap">

        <!-- ▸ VIEW 1: Landing -->
        <div id="view-landing" class="view active">
            <div class="hero">
                <div class="hero-icon"><i data-lucide="gamepad-2"></i></div>
                <h1 class="hero-title">퀴즈 게임 허브</h1>
                <p class="hero-sub">선생님이 알려준 PIN을 입력하세요</p>
            </div>

            <div class="glass-container pin-section">
                <p class="pin-label">게임 PIN 입력</p>
                <div class="pin-row" id="pin-row">
                    <input type="tel" class="input-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="tel" class="input-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="tel" class="input-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="tel" class="input-pin" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                </div>
                <button class="btn btn-primary btn-lg pin-submit" id="btn-pin-submit" disabled>참여하기</button>
            </div>

            <div class="teacher-section">
                <div class="divider">교사이신가요?</div>
                <button class="btn btn-secondary google-btn" id="btn-google-login">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Google로 로그인
                </button>
            </div>

        </div>

        <!-- ▸ VIEW 2: Student Name -->
        <div id="view-student" class="view">
            <button class="back-btn" id="btn-back-landing">
                <i data-lucide="arrow-left" style="width:16px;height:16px"></i> 돌아가기
            </button>

            <div class="glass-card session-info-card" id="session-info">
                <div class="session-game-type" id="student-game-type"></div>
                <div class="session-quiz-title" id="student-quiz-title"></div>
            </div>

            <div class="name-form">
                <input type="text" class="input" id="input-student-name"
                       placeholder="이름을 입력하세요" maxlength="10" autocomplete="off">
                <button class="btn btn-primary btn-lg" id="btn-start-game"
                        style="width:100%" disabled>게임 시작</button>
            </div>
        </div>

        <!-- ▸ VIEW 3: Teacher Dashboard -->
        <div id="view-teacher" class="view">
            <div class="profile-bar">
                <img class="profile-photo" id="teacher-photo" src="" alt="">
                <span class="profile-name" id="teacher-name"></span>
                <a href="/dashboard" class="btn btn-sm btn-secondary" style="margin-left:auto;margin-right:8px;text-decoration:none;">
                    <i data-lucide="layout-dashboard" style="width:14px;height:14px;"></i> 퀴즈/학급 관리
                </a>
                <button class="logout-btn" id="btn-logout">로그아웃</button>
            </div>

            <!-- Wizard Tabs -->
            <div class="tab-group wizard-steps" id="wizard-tabs">
                <div class="tab-item active" data-step="1">퀴즈 선택</div>
                <div class="tab-item" data-step="2">게임 타입</div>
                <div class="tab-item" data-step="3">시작</div>
            </div>

            <!-- Step 1: Quiz Set -->
            <div class="wizard-step-panel active" id="step-1">
                <p class="step-title"><span class="step-num">1</span>퀴즈 세트를 선택하세요</p>
                <div class="quiz-list" id="quiz-list"></div>
                <div class="wizard-nav">
                    <button class="btn btn-primary" id="btn-step1-next" disabled>다음</button>
                </div>
            </div>

            <!-- Step 2: Game Type -->
            <div class="wizard-step-panel" id="step-2">
                <p class="step-title"><span class="step-num">2</span>게임 타입을 선택하세요</p>
                <div class="game-type-grid">
                    <div class="glass-card game-type-card selected" data-type="mole">
                        <div class="game-type-icon"><i data-lucide="target"></i></div>
                        <div class="game-type-name">두더지 잡기</div>
                    </div>
                    <div class="glass-card game-type-card" data-type="runner">
                        <div class="game-type-icon"><i data-lucide="zap"></i></div>
                        <div class="game-type-name">퀴즈 러너</div>
                    </div>
                </div>
                <div class="wizard-nav">
                    <button class="btn btn-secondary" id="btn-step2-prev">이전</button>
                    <button class="btn btn-primary" id="btn-step2-next">다음</button>
                </div>
            </div>

            <!-- Step 3: Class + Summary + Start -->
            <div class="wizard-step-panel" id="step-3">
                <p class="step-title"><span class="step-num">3</span>학급 선택 (선택사항)</p>
                <div class="class-list" id="class-list"></div>

                <div class="glass-card summary-card" id="summary-card">
                    <div class="summary-row">
                        <span class="summary-label">퀴즈</span>
                        <span class="summary-value" id="sum-quiz"></span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">게임</span>
                        <span class="summary-value" id="sum-game"></span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">학급</span>
                        <span class="summary-value" id="sum-class"></span>
                    </div>
                </div>

                <div class="wizard-nav">
                    <button class="btn btn-secondary" id="btn-step3-prev">이전</button>
                    <button class="btn btn-primary" id="btn-start-session">세션 시작</button>
                </div>
            </div>
        </div>

        <!-- ▸ VIEW 4: Session Lobby -->
        <div id="view-lobby" class="view">
            <div class="lobby-header">
                <p class="lobby-label">학생에게 이 PIN을 알려주세요</p>
                <div class="pin-display">
                    <div class="pin-digits" id="lobby-pin"></div>
                </div>
                <div id="lobby-qr" style="margin-top:var(--space-xl);display:inline-block;padding:var(--space-md);background:white;border-radius:var(--radius-lg);"></div>
            </div>

            <div class="glass-card lobby-summary">
                <div class="summary-row">
                    <span class="summary-label">퀴즈</span>
                    <span class="summary-value" id="lobby-quiz"></span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">게임</span>
                    <span class="summary-value" id="lobby-game"></span>
                </div>
            </div>

            <div class="lobby-actions">
                <button class="btn btn-primary btn-lg" id="btn-copy-pin">
                    <i data-lucide="copy" style="width:18px;height:18px"></i> PIN 복사
                </button>
                <button class="btn btn-outline-danger" id="btn-end-session">세션 종료</button>
                <button class="btn btn-secondary" id="btn-back-hub">허브로 돌아가기</button>
            </div>
        </div>

    </div>

    <!-- Shared Modules (순서 중요) -->
    <script src="/shared/firebase-init.js"></script>
    <script src="/shared/constants.js"></script>
    <script src="/shared/auth.js"></script>
    <script src="/shared/quiz-bridge.js"></script>
    <script src="/shared/ui-kit.js"></script>
    <script src="/shared/migrate-to-v2.js"></script>

    <script>
    (function () {
        'use strict';

        // ─── State ───
        var state = {
            currentView: 'landing',
            session: null,           // findSessionByPin 결과
            selectedQuizSet: null,   // { id, title, problemCount, ... }
            selectedGameType: 'mole',
            selectedClass: null,     // { id, name }
            createdSession: null,    // createSession 결과
            createdPin: '',
            quizSets: [],
            classes: [],
            teacherProfile: null
        };

        var GAME_LABELS = { mole: '두더지 잡기', runner: '퀴즈 러너' };

        // ─── DOM Cache ───
        var $ = function (sel) { return document.querySelector(sel); };
        var $$ = function (sel) { return document.querySelectorAll(sel); };

        // ─── Init ───
        async function init() {
            lucide.createIcons();
            setupPinInputs();
            bindEvents();

            // 인증 상태가 완전히 복원될 때까지 대기
            await EduAuth.onAuthReady;

            // URL 파라미터로 PIN 자동 입력
            var urlParams = new URLSearchParams(window.location.search);
            var pinFromUrl = urlParams.get('pin');
            if (pinFromUrl && /^\d{4}$/.test(pinFromUrl)) {
                var inputs = $$('#pin-row .input-pin');
                for (var i = 0; i < 4; i++) {
                    inputs[i].value = pinFromUrl[i];
                }
                updatePinSubmitState();
                // 자동 제출
                handlePinSubmit(pinFromUrl);
                // URL에서 파라미터 제거 (히스토리 깔끔하게)
                window.history.replaceState({}, '', location.pathname);
            }

            // Google 리다이렉트 결과 처리 (hub가 리다이렉트 대상)
            EduAuth.processRedirect();

            EduAuth.onAuthChanged(function (user) {
                handleAuthChanged(user);
            });
        }

        // ─── View Switch ───
        function showView(id) {
            $$('.view').forEach(function (v) { v.classList.remove('active'); });
            var el = $('#view-' + id);
            if (el) {
                el.classList.add('active');
                el.classList.add('fade-in');
                state.currentView = id;
            }
            // re-render icons for the new view
            setTimeout(function () { lucide.createIcons(); }, 50);
        }

        // ─── PIN Inputs ───
        function setupPinInputs() {
            var inputs = $$('#pin-row .input-pin');
            var submitBtn = $('#btn-pin-submit');

            inputs.forEach(function (inp, i) {
                inp.addEventListener('input', function () {
                    // 숫자만 허용
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value && i < inputs.length - 1) {
                        inputs[i + 1].focus();
                    }
                    updatePinSubmitState();
                });

                inp.addEventListener('keydown', function (e) {
                    if (e.key === 'Backspace' && !this.value && i > 0) {
                        inputs[i - 1].focus();
                    }
                    if (e.key === 'Enter') {
                        var pin = getPinValue();
                        if (pin.length === 4) handlePinSubmit(pin);
                    }
                });

                inp.addEventListener('focus', function () {
                    this.select();
                });
            });

            // 붙여넣기 지원
            inputs[0].addEventListener('paste', function (e) {
                e.preventDefault();
                var pasted = (e.clipboardData || window.clipboardData).getData('text').trim();
                var digits = pasted.replace(/[^0-9]/g, '').slice(0, 4);
                for (var j = 0; j < digits.length && j < inputs.length; j++) {
                    inputs[j].value = digits[j];
                }
                if (digits.length > 0) {
                    var focusIdx = Math.min(digits.length, inputs.length - 1);
                    inputs[focusIdx].focus();
                }
                updatePinSubmitState();
                // 4자리 붙여넣기 시 자동 제출
                if (digits.length === 4) {
                    handlePinSubmit(digits);
                }
            });

            // 자동 포커스
            setTimeout(function () { inputs[0].focus(); }, 300);
        }

        function getPinValue() {
            var inputs = $$('#pin-row .input-pin');
            var pin = '';
            inputs.forEach(function (inp) { pin += inp.value; });
            return pin;
        }

        function updatePinSubmitState() {
            $('#btn-pin-submit').disabled = getPinValue().length !== 4;
        }

        function clearPinInputs() {
            $$('#pin-row .input-pin').forEach(function (inp) { inp.value = ''; });
            updatePinSubmitState();
        }

        // ─── PIN Submit ───
        async function handlePinSubmit(pin) {
            var submitBtn = $('#btn-pin-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = '확인 중...';

            try {
                var session = await QuizBridge.findSessionByPin(pin);
                if (!session) {
                    $('#pin-row').classList.add('shake');
                    setTimeout(function () { $('#pin-row').classList.remove('shake'); }, 400);
                    UIKit.showToast('존재하지 않는 PIN입니다', { type: 'error' });
                    clearPinInputs();
                    setTimeout(function () {
                        $$('#pin-row .input-pin')[0].focus();
                    }, 100);
                    return;
                }

                state.session = session;
                // Student Name 뷰로 전환
                var gameLabel = GAME_LABELS[session.gameType] || session.gameType;
                $('#student-game-type').textContent = gameLabel;
                $('#student-quiz-title').textContent = session.quizSetTitle || '퀴즈';
                showView('student');
                setTimeout(function () { $('#input-student-name').focus(); }, 200);
            } catch (err) {
                console.error('PIN 확인 실패:', err);
                UIKit.showToast('오류가 발생했습니다', { type: 'error' });
                clearPinInputs();
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '참여하기';
                updatePinSubmitState();
            }
        }

        // ─── Student Entry ───
        function handleStudentEntry() {
            var name = $('#input-student-name').value.trim();
            if (!name || !state.session) return;

            var s = state.session;
            var gameType = s.gameType || 'mole';
            var url = '/games/' + gameType + '/?session=' +
                      encodeURIComponent(s.id) +
                      '&student=' + encodeURIComponent(name);

            window.location.href = url;
        }

        // ─── Google Login ───
        async function handleGoogleLogin() {
            var btn = $('#btn-google-login');
            btn.disabled = true;
            btn.textContent = '로그인 중...';
            try {
                await EduAuth.signInWithGoogle();
                // onAuthChanged가 뷰 전환을 처리
            } catch (err) {
                console.error('로그인 실패:', err);
                if (err.code !== 'auth/popup-closed-by-user') {
                    UIKit.showToast('로그인에 실패했습니다', { type: 'error' });
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML =
                    '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>' +
                    ' Google로 로그인';
            }
        }

        // ─── Auth Changed ───
        async function handleAuthChanged(user) {
            if (user && !user.isAnonymous) {
                // 뷰 전환은 반드시 실행 (데이터 로드 실패와 무관)
                $('#teacher-name').textContent = user.displayName || '선생님';
                $('#teacher-photo').src = user.photoURL || '';
                showView('teacher');

                // 데이터 로드는 별도로 (실패해도 뷰 유지)
                try {
                    var profile = await EduAuth.getTeacherProfile();
                    if (profile) {
                        state.teacherProfile = profile;
                        $('#teacher-photo').src = profile.photoURL || '';
                        $('#teacher-name').textContent = profile.displayName || user.displayName || '선생님';
                    }
                    await loadTeacherData();
                } catch (err) {
                    console.error('교사 데이터 로드 실패:', err);
                    UIKit.showToast('데이터를 불러올 수 없습니다', { type: 'error' });
                }
            } else {
                // 인증 손실 시 → 교사/로비 뷰에서 Landing으로 복귀
                if (state.currentView === 'teacher' || state.currentView === 'lobby') {
                    resetTeacherState();
                    state.teacherProfile = null;
                    showView('landing');
                    clearPinInputs();
                    UIKit.showToast('로그인이 만료되었습니다. 다시 로그인해주세요.', { type: 'error' });
                }
            }
        }

        // ─── Load Teacher Data ───
        async function loadTeacherData() {
            try {
                var quizSets = await QuizBridge.getQuizSets();
                state.quizSets = quizSets;
                renderQuizList(quizSets);

                var classes = await QuizBridge.getClasses();
                state.classes = classes;
                renderClassList(classes);
            } catch (err) {
                console.error('데이터 로드 실패:', err);
            }
        }

        function renderQuizList(sets) {
            var list = $('#quiz-list');
            if (!sets || sets.length === 0) {
                list.innerHTML =
                    '<div class="empty-state">' +
                    '<div class="empty-icon"><i data-lucide="file-question"></i></div>' +
                    '<p>퀴즈 세트가 없습니다</p>' +
                    '</div>';
                lucide.createIcons();
                return;
            }

            list.innerHTML = sets.map(function (s) {
                return '<div class="quiz-item" data-id="' + s.id + '">' +
                    '<span class="quiz-item-title">' + escapeHtml(s.title || '제목 없음') + '</span>' +
                    '<span class="quiz-item-count">' + (s.problemCount || 0) + '문제</span>' +
                    '</div>';
            }).join('');

            // 클릭 이벤트
            list.querySelectorAll('.quiz-item').forEach(function (item) {
                item.addEventListener('click', function () {
                    list.querySelectorAll('.quiz-item').forEach(function (q) { q.classList.remove('selected'); });
                    this.classList.add('selected');
                    var id = this.getAttribute('data-id');
                    state.selectedQuizSet = sets.find(function (s) { return s.id === id; }) || null;
                    $('#btn-step1-next').disabled = false;
                });
            });
        }

        function renderClassList(classes) {
            var list = $('#class-list');
            if (!classes || classes.length === 0) {
                list.innerHTML = '<p class="text-caption" style="text-align:center;padding:var(--space-md)">등록된 학급이 없습니다</p>';
                return;
            }

            list.innerHTML = classes.map(function (c) {
                return '<div class="class-item" data-id="' + c.id + '">' +
                    '<span style="flex:1;font-size:var(--font-size-sm);font-weight:600">' + escapeHtml(c.name || '이름 없음') + '</span>' +
                    '<span class="text-caption">' + (c.studentCount || 0) + '명</span>' +
                    '</div>';
            }).join('');

            list.querySelectorAll('.class-item').forEach(function (item) {
                item.addEventListener('click', function () {
                    var wasSelected = this.classList.contains('selected');
                    list.querySelectorAll('.class-item').forEach(function (c) { c.classList.remove('selected'); });
                    if (!wasSelected) {
                        this.classList.add('selected');
                        var id = this.getAttribute('data-id');
                        state.selectedClass = classes.find(function (c) { return c.id === id; }) || null;
                    } else {
                        state.selectedClass = null;
                    }
                    updateSummary();
                });
            });
        }

        // ─── Wizard ───
        function setWizardStep(n) {
            // Tabs
            $$('#wizard-tabs .tab-item').forEach(function (t) { t.classList.remove('active'); });
            var tabEl = $('#wizard-tabs .tab-item[data-step="' + n + '"]');
            if (tabEl) tabEl.classList.add('active');

            // Panels
            $$('.wizard-step-panel').forEach(function (p) { p.classList.remove('active'); });
            var panel = $('#step-' + n);
            if (panel) {
                panel.classList.add('active');
                panel.classList.add('fade-in');
            }

            if (n === 3) updateSummary();
        }

        function updateSummary() {
            var qs = state.selectedQuizSet;
            var gt = state.selectedGameType;
            var cl = state.selectedClass;

            $('#sum-quiz').textContent = qs ? qs.title : '-';
            $('#sum-game').textContent = GAME_LABELS[gt] || gt;
            $('#sum-class').textContent = cl ? cl.name : '전체';
        }

        // ─── Start Session ───
        async function handleStartSession() {
            var btn = $('#btn-start-session');
            btn.disabled = true;
            btn.textContent = '세션 생성 중...';

            // 인증 상태 확인 — 만료 시 재로그인 유도
            if (!EduAuth.isTeacher()) {
                btn.disabled = false;
                btn.textContent = '세션 시작';
                UIKit.showToast('로그인이 만료되었습니다. 다시 로그인해주세요.', { type: 'error' });
                resetTeacherState();
                state.teacherProfile = null;
                showView('landing');
                clearPinInputs();
                return;
            }

            try {
                var pin = await QuizBridge.generateUniquePin();
                var sessionId = await QuizBridge.createSession({
                    pin: pin,
                    gameType: state.selectedGameType,
                    quizSetId: state.selectedQuizSet ? state.selectedQuizSet.id : '',
                    quizSetTitle: state.selectedQuizSet ? state.selectedQuizSet.title : '',
                    classId: state.selectedClass ? state.selectedClass.id : '',
                    className: state.selectedClass ? state.selectedClass.name : ''
                });

                state.createdSession = sessionId;
                state.createdPin = pin;

                // Lobby 뷰
                $('#lobby-pin').textContent = pin;
                $('#lobby-quiz').textContent = state.selectedQuizSet ? state.selectedQuizSet.title : '-';
                $('#lobby-game').textContent = GAME_LABELS[state.selectedGameType] || state.selectedGameType;

                // QR 코드 생성
                var qrContainer = $('#lobby-qr');
                qrContainer.innerHTML = '';
                new QRCode(qrContainer, {
                    text: location.origin + '/hub?pin=' + pin,
                    width: 160,
                    height: 160,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });

                showView('lobby');
                UIKit.showToast('세션이 생성되었습니다!', { type: 'success' });
            } catch (err) {
                console.error('세션 생성 실패:', err);
                UIKit.showToast('세션 생성 실패: ' + (err && err.message ? err.message : '알 수 없는 오류'), { type: 'error' });
            } finally {
                btn.disabled = false;
                btn.textContent = '세션 시작';
            }
        }

        // ─── Copy PIN ───
        function copyPin() {
            var pin = state.createdPin;
            if (!pin) return;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(pin).then(function () {
                    UIKit.showToast('PIN이 복사되었습니다', { type: 'success', duration: 1500 });
                });
            } else {
                // Fallback
                var ta = document.createElement('textarea');
                ta.value = pin;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                UIKit.showToast('PIN이 복사되었습니다', { type: 'success', duration: 1500 });
            }
        }

        // ─── End Session ───
        async function handleEndSession() {
            if (!state.createdSession) return;

            // 인증 확인 — 만료 시 세션 정리만 하고 Landing으로
            if (!EduAuth.isTeacher()) {
                resetTeacherState();
                state.teacherProfile = null;
                showView('landing');
                clearPinInputs();
                UIKit.showToast('로그인이 만료되었습니다. 다시 로그인해주세요.', { type: 'error' });
                return;
            }

            try {
                await QuizBridge.endSession(state.createdSession);
                UIKit.showToast('세션이 종료되었습니다', { type: 'info' });
                resetTeacherState();
                showView('teacher');
            } catch (err) {
                console.error('세션 종료 실패:', err);
                UIKit.showToast('세션 종료에 실패했습니다', { type: 'error' });
            }
        }

        function resetTeacherState() {
            state.selectedQuizSet = null;
            state.selectedGameType = 'mole';
            state.selectedClass = null;
            state.createdSession = null;
            state.createdPin = '';

            // QR 컨테이너 비우기
            var qrEl = $('#lobby-qr');
            if (qrEl) qrEl.innerHTML = '';

            // Reset wizard UI
            setWizardStep(1);
            $$('.quiz-item').forEach(function (q) { q.classList.remove('selected'); });
            $$('.class-item').forEach(function (c) { c.classList.remove('selected'); });
            $$('.game-type-card').forEach(function (g) { g.classList.remove('selected'); });
            var moleCard = $('.game-type-card[data-type="mole"]');
            if (moleCard) moleCard.classList.add('selected');
            $('#btn-step1-next').disabled = true;
        }

        // ─── Logout ───
        async function handleLogout() {
            try {
                await EduAuth.signOut();
                resetTeacherState();
                state.teacherProfile = null;
                showView('landing');
                clearPinInputs();
                setTimeout(function () {
                    $$('#pin-row .input-pin')[0].focus();
                }, 200);
            } catch (err) {
                console.error('로그아웃 실패:', err);
            }
        }

        // ─── Bind Events ───
        function bindEvents() {
            // Landing
            $('#btn-pin-submit').addEventListener('click', function () {
                var pin = getPinValue();
                if (pin.length === 4) handlePinSubmit(pin);
            });
            $('#btn-google-login').addEventListener('click', handleGoogleLogin);

            // Student
            $('#btn-back-landing').addEventListener('click', function () {
                state.session = null;
                showView('landing');
                clearPinInputs();
                setTimeout(function () { $$('#pin-row .input-pin')[0].focus(); }, 200);
            });
            $('#input-student-name').addEventListener('input', function () {
                $('#btn-start-game').disabled = !this.value.trim();
            });
            $('#btn-start-game').addEventListener('click', handleStudentEntry);
            $('#input-student-name').addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && this.value.trim()) handleStudentEntry();
            });

            // Teacher - Wizard
            $('#btn-step1-next').addEventListener('click', function () { setWizardStep(2); });
            $('#btn-step2-prev').addEventListener('click', function () { setWizardStep(1); });
            $('#btn-step2-next').addEventListener('click', function () { setWizardStep(3); });
            $('#btn-step3-prev').addEventListener('click', function () { setWizardStep(2); });
            $('#btn-start-session').addEventListener('click', handleStartSession);
            $('#btn-logout').addEventListener('click', handleLogout);

            // Game type selection
            $$('.game-type-card:not(.disabled)').forEach(function (card) {
                card.addEventListener('click', function () {
                    $$('.game-type-card').forEach(function (c) { c.classList.remove('selected'); });
                    this.classList.add('selected');
                    state.selectedGameType = this.getAttribute('data-type');
                });
            });

            // Wizard tab clicks
            $$('#wizard-tabs .tab-item').forEach(function (tab) {
                tab.addEventListener('click', function () {
                    var step = parseInt(this.getAttribute('data-step'));
                    // step 2로 가려면 퀴즈 선택 필요
                    if (step >= 2 && !state.selectedQuizSet) return;
                    setWizardStep(step);
                });
            });

            // Lobby
            $('#btn-copy-pin').addEventListener('click', copyPin);
            $('#btn-end-session').addEventListener('click', handleEndSession);
            $('#btn-back-hub').addEventListener('click', function () {
                resetTeacherState();
                showView('teacher');
            });
        }

        // ─── Util ───
        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ─── Start ───
        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
